services:
  api:
    build: .
    container_name: myorderfactory-prod
    ports:
      - "9091:9091"
    profiles: ["prod"]
    depends_on:
      api-db:
          condition: service_healthy
      redis:
          condition: service_started
    environment:
      - SERVER_PORT=9091
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_JPA_DATABASE_PLATFORM=org.hibernate.dialect.PostgreSQLDialect
      - SPRING_DATASOURCE_URL=jdbc:postgresql://api-db:5433/${DB_NAME}
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - SPRING_CACHE_TYPE=redis
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    networks:
      - orderfactory-network

  api-db:
    image: postgres:17-alpine
    container_name: my-order-factory-db
    profiles: ["prod"]
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    volumes:
      - ./postgres-db:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 10s
      retries: 5
      timeout: 5s
    networks:
      - orderfactory-network


  redis:
    image: redis:7.4.2-alpine
    container_name: redis_orderfactory
    profiles: ["prod"]
    ports:
      - "6379:6379"
    networks:
      - orderfactory-network


  redis-test:
    image: redis:7.4.2-alpine
    container_name: test_cache_mof
    profiles: [ "test" ]
    command: redis-server --port 6380
    ports:
      - "6380:6380"
    networks:
      - test-network

networks:
  orderfactory-network:
    driver: bridge

  test-network:
    driver: bridge
